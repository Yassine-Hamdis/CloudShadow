# ─── RBAC for K8s Agent ───────────────────────────────────────────────────
# Grants the agent permission to read node and pod metrics
# from the K8s metrics-server API
#
# Without this the agent gets 403 Forbidden
# when calling metrics.k8s.io API

# ── ServiceAccount ────────────────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudshadow-agent
  namespace: monitoring

---
# ── ClusterRole ───────────────────────────────────────────────────────────
# Defines WHAT the agent is allowed to read
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: cloudshadow-agent-role
rules:
  # ── Read node metrics from metrics-server ────────────────────────────
  - apiGroups: ["metrics.k8s.io"]
    resources: ["nodes", "pods"]
    verbs: ["get", "list"]

  # ── Read node info (capacity, allocatable) ───────────────────────────
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]

  # ── Read pod info ────────────────────────────────────────────────────
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]

---
# ── ClusterRoleBinding ────────────────────────────────────────────────────
# Binds the role to the service account
# (gives the agent the permissions defined above)
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: cloudshadow-agent-binding
subjects:
  - kind: ServiceAccount
    name: cloudshadow-agent
    namespace: monitoring
roleRef:
  kind: ClusterRole
  name: cloudshadow-agent-role
  apiGroup: rbac.authorization.k8s.io