# ─── CloudShadow K8s Agent DaemonSet ─────────────────────────────────────
# Runs ONE agent pod on EVERY node in the cluster
# Automatically added to new nodes when they join
#
# Each agent:
#   → Reads its node's CPU/Memory from metrics-server
#   → Reads Disk/Network from host via psutil
#   → Sends to CloudShadow backend every 20s
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: cloudshadow-agent
  namespace: monitoring
  labels:
    app: cloudshadow-agent
spec:
  selector:
    matchLabels:
      app: cloudshadow-agent
  template:
    metadata:
      labels:
        app: cloudshadow-agent
    spec:
      # ── Use our service account (has RBAC permissions) ───────────────
      serviceAccountName: cloudshadow-agent

      # ── Run on every node including control plane ────────────────────
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule

      containers:
        - name: cloudshadow-agent
          image: yacinham10/cloudshadow:k8s-agent
          imagePullPolicy: Always

          # ── Environment Variables ──────────────────────────────────────
          envFrom:
            - configMapRef:
                name: agent-config

          env:
            # ── Server token from secret ─────────────────────────────
            - name: SERVER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: agent-secret
                  key: server-token

            # ── Node name injected by K8s (downward API) ─────────────
            # This tells the agent which node it's running on
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName

          # ── Mount host filesystem for disk/network metrics ───────────
          volumeMounts:
            - name: host-root
              mountPath: /host
              readOnly: true

          # ── Resource Limits ──────────────────────────────────────────
          # Keep small - agent should not impact monitored workloads
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"

          # ── Health Check ─────────────────────────────────────────────
          livenessProbe:
            exec:
              command:
                - python
                - -c
                - "import requests; requests.get('http://localhost:8080/actuator/health', timeout=3)"
            initialDelaySeconds: 30
            periodSeconds: 60
            failureThreshold: 3

      # ── Volumes ────────────────────────────────────────────────────────
      volumes:
        # Mount host filesystem
        # Allows psutil to read real node disk/network
        - name: host-root
          hostPath:
            path: /

      # ── Host Network ───────────────────────────────────────────────────
      # Use host network for accurate network metrics
      hostNetwork: false

      # ── Restart Policy ─────────────────────────────────────────────────
      restartPolicy: Always