# ─── Agent Secret ─────────────────────────────────────────────────────────
# Stores the server token used to authenticate
# with CloudShadow backend
#
# To encode your token:
# echo -n "your-server-token" | base64
#
# Replace the value below with your actual token
apiVersion: v1
kind: Secret
metadata:
  name: agent-secret
  namespace: monitoring
type: Opaque
data:
  server-token: Y2NhMzZhMjU0YzFmNDcyOGIxYWYyZjI4MDUyYjg0MmM=
  # ↑ base64 of "your-server-token-here"
  # Replace with: echo -n "your-actual-token" | base64