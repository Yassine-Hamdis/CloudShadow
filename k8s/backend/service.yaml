# ─── Backend Service ──────────────────────────────────────────────────────
# ClusterIP for internal communication
# Frontend and agent call backend:8080 inside cluster
apiVersion: v1
kind: Service
metadata:
  name: backend
  namespace: cloudshadow
spec:
  selector:
    app: backend
  ports:
    - port: 8080
      targetPort: 8080