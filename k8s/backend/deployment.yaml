# ─── Backend Deployment ───────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: cloudshadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # ── Wait for MySQL to be ready ─────────────────────────────────────
      initContainers:
        - name: wait-for-mysql
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z mysql 3306; do
                echo "Waiting for MySQL..."
                sleep 3
              done
              echo "MySQL is ready!"

        - name: wait-for-ai
          image: busybox:1.35
          command:
            - sh
            - -c
            - |
              until nc -z ai-service 8000; do
                echo "Waiting for AI service..."
                sleep 3
              done
              echo "AI service is ready!"

      containers:
        - name: backend
          image: yacinham10/cloudshadow:backend
          imagePullPolicy: Always
          ports:
            - containerPort: 8080

          # ── Non-sensitive config ───────────────────────────────────────
          envFrom:
            - configMapRef:
                name: backend-config

          # ── Sensitive config ───────────────────────────────────────────
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: db-password

            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-secret

          # ── Resource Limits ────────────────────────────────────────────
          resources:
            requests:
              memory: "512Mi"
              cpu: "200m"
            limits:
              memory: "512Gi"
              cpu: "500m"

          # ── Health Checks ──────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 5

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 90
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3