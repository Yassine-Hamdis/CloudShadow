# ─── Backend ConfigMap ────────────────────────────────────────────────────
# Non-sensitive backend configuration
# URLs use K8s service names (not localhost!)
apiVersion: v1
kind: ConfigMap
metadata:
  name: backend-config
  namespace: cloudshadow
data:
  SPRING_PROFILES_ACTIVE: "docker"
  SPRING_DATASOURCE_URL: "jdbc:mysql://mysql:3306/cloudShadowdb?createDatabaseIfNotExist=true"
  SPRING_DATASOURCE_USERNAME: "cloudshadow_user"
  AI_SERVICE_URL: "http://ai-service:8000"
  JWT_EXPIRATION: "86400000"
  TZ: "Africa/Casablanca"