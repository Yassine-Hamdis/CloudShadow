# ─── MySQL StatefulSet ────────────────────────────────────────────────────
# StatefulSet instead of Deployment because:
#   - MySQL needs stable network identity
#   - MySQL needs persistent storage
#   - Order matters for startup/shutdown
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: cloudshadow
spec:
  serviceName: mysql
  replicas: 1
  selector:
    matchLabels:
      app: mysql
  template:
    metadata:
      labels:
        app: mysql
    spec:
      containers:
        - name: mysql
          image: mysql:8.0
          ports:
            - containerPort: 3306

          # ── Environment from Secret ──────────────────────────────────
          env:
            - name: MYSQL_ROOT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: root-password

            - name: MYSQL_DATABASE
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: database

            - name: MYSQL_USER
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: username

            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: mysql-secret
                  key: password

          # ── Volume Mounts ────────────────────────────────────────────
          volumeMounts:
            - name: mysql-storage
              mountPath: /var/lib/mysql
            - name: init-sql
              mountPath: /docker-entrypoint-initdb.d

          # ── Resource Limits ──────────────────────────────────────────
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Health Check ─────────────────────────────────────────────
          readinessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - "-h"
                - localhost
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5

          livenessProbe:
            exec:
              command:
                - mysqladmin
                - ping
                - "-h"
                - localhost
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 5

      # ── Volumes ────────────────────────────────────────────────────────
      volumes:
        - name: mysql-storage
          persistentVolumeClaim:
            claimName: mysql-pvc
        - name: init-sql
          configMap:
            name: mysql-init-sql

---
# ─── MySQL Init SQL ConfigMap ─────────────────────────────────────────────
# Mounts init.sql into MySQL container
# Runs on first startup to create user and grant privileges
apiVersion: v1
kind: ConfigMap
metadata:
  name: mysql-init-sql
  namespace: cloudshadow
data:
  init.sql: |
    CREATE DATABASE IF NOT EXISTS cloudShadowdb;
    CREATE USER IF NOT EXISTS 'cloudshadow_user'@'%'
      IDENTIFIED BY 'cloudshadow123';
    GRANT ALL PRIVILEGES ON cloudShadowdb.*
      TO 'cloudshadow_user'@'%';
    FLUSH PRIVILEGES;