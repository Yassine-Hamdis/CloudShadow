# ─── MySQL Service ────────────────────────────────────────────────────────
# ClusterIP = internal only (MySQL should never be public)
# Backend connects to mysql:3306 inside the cluster
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: cloudshadow
spec:
  selector:
    app: mysql
  ports:
    - port: 3306
      targetPort: 3306
  clusterIP: None    # Headless service for StatefulSet
                     # Allows direct pod DNS: mysql-0.mysql