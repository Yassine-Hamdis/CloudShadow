# ─── MySQL Persistent Volume Claim ───────────────────────────────────────
# Requests storage for MySQL data
# DigitalOcean provides "do-block-storage" storage class
# This ensures data survives pod restarts
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: cloudshadow
spec:
  accessModes:
    - ReadWriteOnce        # One node at a time (fine for MySQL)
  storageClassName: do-block-storage  # DigitalOcean storage class
  resources:
    requests:
      storage: 10Gi        # 10GB for MySQL data