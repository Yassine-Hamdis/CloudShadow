# ─── AI Service Service ───────────────────────────────────────────────────
# ClusterIP = internal only
# Backend calls ai-service:8000 inside cluster
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: cloudshadow
spec:
  selector:
    app: ai-service
  ports:
    - port: 8000
      targetPort: 8000