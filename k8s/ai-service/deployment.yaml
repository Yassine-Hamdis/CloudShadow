# ─── AI Service Deployment ───────────────────────────────────────────────
# Stateless service - can scale horizontally
# No persistent storage needed
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: cloudshadow
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
    spec:
      containers:
        - name: ai-service
          image: yacinham10/cloudshadow:ai-service
          imagePullPolicy: Always
          ports:
            - containerPort: 8000

          # ── Resource Limits ──────────────────────────────────────────
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"

          # ── Health Checks ────────────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5