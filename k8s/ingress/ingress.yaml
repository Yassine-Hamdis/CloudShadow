# ─── Ingress ──────────────────────────────────────────────────────────────
# Routes external traffic to frontend and backend
# Uses nginx ingress controller :
#    helm repo add ingress-nginx https://kubernetes.github.io/ingress-nginx
#    helm repo update

#    helm install nginx-ingress ingress-nginx/ingress-nginx \
#      --namespace ingress-nginx \
#      --create-namespace

#    kubectl get svc -n ingress-nginx

# On DigitalOcean this creates a LoadBalancer automatically
#
# Access after deploy:
#   Frontend: http://<EXTERNAL-IP>/
#   Backend:  http://<EXTERNAL-IP>/api/
#   WebSocket: ws://<EXTERNAL-IP>/ws
# k8s/ingress/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cloudshadow-ingress
  namespace: cloudshadow
  annotations:
    kubernetes.io/ingress.class: "nginx"
    # ── WebSocket support ─────────────────────────────────────────────
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/server-snippets: |
      location /ws {
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
      }
spec:
  rules:
    - http:
        paths:
          # ── API routes → Backend ───────────────────────────────────
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # ── WebSocket → Backend ────────────────────────────────────
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: backend
                port:
                  number: 8080

          # ── Everything else → Frontend ─────────────────────────────
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 80