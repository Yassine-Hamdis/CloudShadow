# ??? Server ???????????????????????????????????????????????????????????????
server.address=0.0.0.0
server.port=8080

# ??? Database (local) ?????????????????????????????????????????????????????
spring.datasource.url=jdbc:mysql://localhost:3306/cloudShadowdb?createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=123
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ??? JPA / Hibernate ??????????????????????????????????????????????????????
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# ??? JWT ??????????????????????????????????????????????????????????????????
jwt.secret=cloudshadow-super-secret-key-must-be-at-least-256-bits-long!!
jwt.expiration=86400000

# ??? Actuator ?????????????????????????????????????????????????????????????
management.endpoints.web.exposure.include=health
management.endpoint.health.show-details=always

# ??? CLOUDSHADOW Custom Config ????????????????????????????????????????????
# Public URL of the backend (used in agent install instructions)
cloudshadow.backend.public-url=http://localhost:8080

# Agent download URL
cloudshadow.agent.download-url=https://github.com/Yassine-Hamdis/cloudshadow-agent

# AI Service URL
cloudshadow.ai.service.url=http://localhost:8000

# Timezone
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC