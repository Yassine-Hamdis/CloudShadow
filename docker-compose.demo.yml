version: '3.9'

# ─── DEMO MODE ────────────────────────────────────────────────────────────
# This compose file adds a Docker agent that monitors
# the backend container itself - perfect for live demo
#
# Usage: docker-compose -f docker-compose.yml
#                       -f docker-compose.demo.yml up -d
# ──────────────────────────────────────────────────────────────────────────

services:

  # ─── CloudShadow Docker Agent (monitors backend container) ───────────
  cloudshadow-agent:
    image: yacinham10/cloudshadow:docker-agent
    container_name: cloudshadow-agent
    restart: unless-stopped
    env_file:
      - .env
    environment:
      SERVER_TOKEN: ${AGENT_SERVER_TOKEN}
      BACKEND_URL: http://cloudshadow-backend:8080
      MONITOR_CONTAINER: cloudshadow-backend
      INTERVAL: ${AGENT_INTERVAL:-20}
    volumes:
      # Needs docker socket to read container stats
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - cloudshadow-network