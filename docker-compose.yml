version: '3.8'

services:

  # ── MySQL Database ───────────────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: cloudshadow-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: cloudshadow
      MYSQL_USER: cloudshadow
      MYSQL_PASSWORD: cloudshadow123
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - cloudshadow-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # ── Spring Boot Backend ──────────────────────────────────────────
  backend:
    build:
      context: ./backend        # ← folder containing your Spring Boot pom.xml
      dockerfile: Dockerfile
    container_name: cloudshadow-backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/cloudshadow
      SPRING_DATASOURCE_USERNAME: cloudshadow
      SPRING_DATASOURCE_PASSWORD: cloudshadow123
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
    depends_on:
      db:
        condition: service_healthy
    networks:
      - cloudshadow-network

  # ── React Frontend ───────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend    # ← folder containing your React app
      dockerfile: Dockerfile
    container_name: cloudshadow-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - cloudshadow-network

# ── Volumes ──────────────────────────────────────────────────────────
volumes:
  mysql_data:

# ── Network ───────────────────────────────────────────────────────────
networks:
  cloudshadow-network:
    driver: bridge